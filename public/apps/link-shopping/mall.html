<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="robots" content="index,follow">
    <meta http-equiv ='content-language' content ='zh-cn'>


    <link rel="icon" href="https://www.bluvarri.com/favicon.png">
    <title>链接商店</title>
    <script src="/common/javascripts/avif-webp.min.js"></script>


    <link rel="stylesheet" href="/common/stylesheets/style.scss">
    <link rel="stylesheet" href="/apps/link-shopping/stylesheets/mall.scss">

</head>
<body>
  <micro-app id="app" v-cloak>
    <div class="app-container"  :class="{'sandbox': sandbox=='1' }">
        <main>

          <div id="nav-searchform" >
              <div class="nav-search-btn">
                <i class="bi bi-search"></i>
              </div>
              <div class="nav-search-content">
                <input  v-model="feedList_pagination.param.q" @keyup.enter.native="retrieveFeedListV" class="nav-search-input" type="text" autocomplete="off"  maxlength="100"
                  x-webkit-speech="" x-webkit-grammar="builtin:translate"  placeholder="搜索商品" >
              </div>
              <div class="btn-wrp">
                <button v-if="memberCanPost" v-preventreclick @click="showNewProductModalV" class="btn-tm-primary">
                  <div class="btn-content">
                      我要售卖
                  </div>
                </button>
                <button v-else v-preventreclick @click="retrieveFeedListV" class="btn-tm-primary">
                  <div class="btn-content">
                      搜索
                  </div>
                </button>
              </div>
          </div>

          <div class="tagsContainer">

            <div class="dropdown">
              <a class="btn-dropdown me-5 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-arrow-down-up me-1"></i>查看
              </a>
            
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item groupLabel">            
                    排序
                  </a>
                </li>
  
                <li>
                  <a class="dropdown-item">
                    <div class="form-check form-check-reverse">
                      <label class="form-check-label" for="sortHot">
                        商品热度
                      </label>
                      <input @change="retrieveFeedListV"  v-model="feedList_pagination.param.sort"  value="1" class="form-check-input" name="sortRadios" type="radio"  id="sortHot" >
                    </div>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item">
                    <div class="form-check form-check-reverse">
                      <label class="form-check-label" for="sortCreateTime">
                        上架日期
                      </label>
                      <input @change="retrieveFeedListV"  v-model="feedList_pagination.param.sort"   value="2" class="form-check-input" name="sortRadios" type="radio"  id="sortCreateTime" >
                    </div>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item">
                    <div class="form-check form-check-reverse">
                      <label class="form-check-label" for="sortPirce">
                        商品价格
                      </label>
                      <input @change="retrieveFeedListV"  v-model="feedList_pagination.param.sort"   value="3" class="form-check-input" name="sortRadios" type="radio"  id="sortPirce" >
                    </div>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item">
                    <div class="form-check form-check-reverse">
                      <label class="form-check-label" for="sortModifyTime">
                        编辑时间
                      </label>
                      <input @change="retrieveFeedListV"  v-model="feedList_pagination.param.sort"   value="4" class="form-check-input" name="sortRadios" type="radio"  id="sortModifyTime" >
                    </div>
                  </a>
                </li>
                
  
              </ul>
            </div>
  
          </div>

          <div class="content-container" style="padding-bottom: 160px;">

            <!-- grid start -->
           <div  class="row  gx-3 gy-4 row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-4" >


            <div v-for="card in feedArr" class="col">
              <div class="item-box">
                <div class="item-cover-container">

                  <div class="box-header">
                    <div class="box-action">
                      <button v-preventreclick  @click="copyFeedLinkUrlV(card.linkUrl)" type="button" class="btn btn-action-bar" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-content="复制链接">
                        <i class="bi bi-copy"></i>
                      </button>
                      <button v-preventreclick @click="openLinkV(card.linkUrl)" type="button" class="btn btn-action-bar" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-content="查看商品">
                        <i class="bi bi-box-arrow-up-right"></i>
                      </button>
                      <button v-if="isSellerV(card.sellerBrandId)" v-preventreclick @click="showEditProductModalV(card)" type="button" class="btn btn-action-bar" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-content="编辑商品">
                        <i class="bi bi-pencil-square"></i>
                      </button>
                      <button v-if="canRemovePostV(card)"  v-preventreclick  @click="removeProductV(card.id)" type="button" class="btn btn-action-bar" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-content="移除内容">
                        <i class="bi bi-trash3"></i>
                      </button>
                    </div>
                  </div>

                  <a @click="captueItemDataV(card.id)" :href="card.linkUrl" target="_blank">
                    <img :src="adaptiveImageUriV(card.coverUrl)">
                  </a>
                </div>
                <div class="item-meta">
                  <div class="item-meta__brand d-flex align-items-center gap-2 mb-2">
                    <div class="item-meta__brandAvatar">
                      <img :src="adaptiveImageUriV(card.sellerAvatar) || defaultAvatarImage" @error.once="e => { e.target.src = defaultAvatarImage }"  alt="商家头像">
                    </div>
                    <span class="item-meta__brandName ellipsis-1">{{card.sellerName}}</span>
                  </div>
                  <div class="item-title product-name"><a @click="captueItemDataV(card.id)" :href="card.linkUrl" target="_blank">{{card.title}}</a></div>
                  <div class="price-wrapper">
                    <span class="price-unit">¥</span>
                    <span class="price-value">{{card.price}}</span>
                  </div>

                </div>

              </div>
            </div>
          
            

         </div>
         <!-- grid end -->

            <div  v-show="feedList_pagination.pages > feedList_pagination.current"  class="show-more-row">
              <button v-preventreclick @click="showMoreV" type="button" class="btn btn-show-more"> 显示更多 </button>
            </div>

            <div v-show="feedArr.length == 0" class="not-found-resource">
              <img src="https://d13-content.oss-cn-hangzhou.aliyuncs.com/common/image/not-found-result.png" alt="bluvarri-service-not-found">
              <h4>未找到结果</h4>
            </div>


          </div>


        </main>
    </div>
    <section class="modals">

       <!-- new product Modal start -->
       <div class="modal-container">
         <div class="modal fade dcModal" id="newProductModal" data-bs-backdrop="static" tabindex="-1">
           <div class="modal-dialog  modal-dialog-centered ">
             <div class="modal-content">
               <div class="modal-body">
                 <form onsubmit="return false">
                   <div class="mb-3">
                     <label for="input[newProductName]" class="form-label">商品名称</label>
                     <input id="input[newProductName]" v-model="newProduct.title" maxlength="32" class="form-control" type="text">
                   </div>
                   <div class="mb-3">
                     <label for="input[newProductPrice]" class="form-label">价格</label>
                     <input id="input[newProductPrice]" v-model="newProduct.price" @input="transformInputNumberAsPositiveDecimalV($event)"  max="500000000" step=".1" type="text" class="form-control">
                   </div>
                   <div class="mb-3">
                     <label for="input[newProductLink]" class="form-label">链接</label>
                     <input v-model="newProduct.linkUrl" maxlength="499" class="form-control" type="text" placeholder="商品链接(https://yourlink.com)" >
                   </div>

                   <div class="product-thumnail-container">
                     <div id="link-cover-preview-box" class="link-cover-box">
                       <img v-show="!!newProduct.linkCoverFileUrl" :src="newProduct.linkCoverFileUrl">
                     </div>
                     <div class="title-col">
                       <div class="help-text label-color">封面建议使用至少 99x99 大小的图片。</div>
                       <button type="button" class="btn-file-upload mt-2">
                         <div class="btn-file-upload-wrp">上传图片<input id="file_thumbnail"  @change="previewFeedThumbnailV" class="file-input" type="file" tabindex="-1" multiple="" accept=".jpg,.jpeg,.png,.gif" style="opacity: 0; cursor: pointer; width: 100%; height: 100%; font-size: 0px; position: absolute; top: 0px; left: 0px;"></div>
                       </button>
                     </div>
                   </div>
               
                 </form>

               </div>

               <div class="modal-footer d-flex justify-content-between align-items-center">

                 <button v-preventreclick @click="closeNewProductModalV" type="button" class="btn-action-cancel">
                   <div class="contents">取消</div>
                 </button>

                 <button  :class="{'disabled': !validatedPostFormV()}" v-preventreclick @click="newProductV" type="button" class="btn btn-action-submit">发布</button>

               </div>



             </div>
           </div>
         </div>
       </div>
       <!-- new product Modal end -->

       <!-- edit product Modal start -->
       <div class="modal-container">
         <div class="modal fade dcModal" id="editProductModal" data-bs-backdrop="static" tabindex="-1">
           <div class="modal-dialog  modal-dialog-centered ">
             <div class="modal-content">
               <div class="modal-body">
                 <form onsubmit="return false">
                   <div class="mb-3">
                     <label for="input[editProductName]" class="form-label">商品名称</label>
                     <input id="input[editProductName]" @change="editProductModalHadChange=true;" v-model="editProduct.title" maxlength="32" class="form-control" type="text">
                   </div>
                   <div class="mb-3">
                     <label for="input[editProductPrice]" class="form-label">价格</label>
                     <input id="input[editProductPrice]" @change="editProductModalHadChange=true;"  v-model="editProduct.price" @input="transformInputNumberAsPositiveDecimalV($event)"  max="500000000" step=".1" type="text"  class="form-control">
                   </div>
                 </form>

               </div>

               <div class="modal-footer d-flex justify-content-between align-items-center">

                 <button v-preventreclick @click="closeEditProductModalV" type="button" class="btn-action-cancel">
                   <div class="contents">取消</div>
                 </button>

                 <button  :class="{'disabled': !validatedEditPostFormV()}" v-preventreclick @click="editProductV" type="button" class="btn-action-submit">更新</button>

               </div>

             </div>
           </div>
         </div>
       </div>
       <!-- edit product Modal end -->

   </section>
  </micro-app>

<script type="module" src="/common/javascripts/tm.js"></script>
<script type="module" src="/apps/link-shopping/javascripts/mall.js"></script>



</body>
</html>
