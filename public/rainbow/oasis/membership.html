<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv ='content-language' content ='zh-cn'>

    <link rel="icon" href="https://www.bluvarri.com/favicon.png">
    <title>会员中心</title>
    <script src="/common/javascripts/avif-webp.min.js"></script>

    <link rel="stylesheet" href="/common/stylesheets/style.scss">
    <link rel="stylesheet" href="/rainbow/stylesheets/teixcalaanli.scss">
    <link rel="stylesheet" href="/rainbow/arch/stylesheets/teixcalaanli-arch.scss">

    <link rel="stylesheet" href="/rainbow/oasis/stylesheets/membership.scss">
    <link rel="stylesheet" href="/rainbow/stylesheets/oasis-action-compoent.scss">
    <link rel="stylesheet" href="/rainbow/oasis/stylesheets/fast-link-container.scss">

</head>
<body>
  <micro-app class="d-flex flex-row"  id="app" v-cloak>
    <div class="offcanvas-xxl offcanvas-start" tabindex="-1" id="mcSidebar" aria-labelledby="mcSidebarOffcanvasLabel">
      <div class="sidebarContainer d-flex flex-row">
        <col-nav-main>
          <div class="back-link-box" onclick="history.back()">
            <span class="back-link-btn" title="返回">
              <i class="bi bi-chevron-left"></i>
            </span>
          </div>
          <div class="nav-container-wrapper">
            <a href="/rainbow/teixcalaanli" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-trigger="hover" data-bs-toggle="popover" data-bs-content="彩虹部落"> 
              <div class="nav-item-default nav-teixcalaanli d-flex align-items-center justify-content-center ms-3">
                <i class="bi bi-rainbow"></i>
              </div>
            </a>
            <a href="/messages" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-trigger="hover" data-bs-toggle="popover" data-bs-content="私信"> 
              <div class="nav-private nav-item-default  d-flex align-items-center justify-content-center   ms-3 mt-2">
                <i class="bi bi-soundwave"></i>             
              </div>
            </a>
            <a :key="oasis.id" v-for="oasis in joinedoases.records"  :href="'/'+oasis.handle" data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-trigger="hover" data-bs-toggle="popover" :data-bs-content="oasis.title">
              <div class="nav-item-default  d-flex align-items-center justify-content-center   ms-3 mt-2"
                  :class="{'active': oasis.id==oasisId}">
                <div class="oasis-avatar-wrapper">
                  <img class="oasis-avatar-tiny" 
                :src="adaptiveImageUriV(oasis.avatar) || oasisAvatarDefault" @error="e => { e.target.src = oasisAvatarDefault }">  
                </div>
              </div>
            </a>

          </div>
          
          <div class="nav-setting">
            <div class="nav-item-default nav-gear d-flex align-items-center justify-content-center ms-3">
              <div class="btn-group">
                <button type="button" class="btn btn-secondary dropdown-toggle button_user_vue brand-avatar" data-bs-toggle="dropdown" aria-expanded="false">
                  <img  :src="adaptiveImageUriV(getIdentity().avatar)  || defaultAvatarImage" @error.once="e => { e.target.src = defaultAvatarImage }">
                </button>
                <ul class="dropdown-menu dropdown-menu-end dropdown-dark ms-5">
                  <li>
                    <a href="/estudio/studio-setting-profile">
                      <button class="dropdown-item" type="button">
                        <i class="bi bi-person-vcard me-1"></i> 品牌形象
                      </button>
                    </a>
                  </li>
                  <li>
                      <button @click="logout()" class="dropdown-item" type="button">   
                        <i class="bi bi-box-arrow-right me-1"></i> 退出登录 
                      </button>
                  </li>
                  <li>
                    <a href="/mall/delete-account">
                      <button class="dropdown-item" type="button">
                        <i class="bi bi-trash3 me-1"></i> 删除账号
                      </button>
                    </a>
                  </li>
                  
                  <li>
                    <button class="dropdown-item" type="button" data-bs-toggle="offcanvas" data-bs-target="#feedback_offcanvas_right" aria-controls="feedback_offcanvas_right">
                      <i class="bi bi-flag me-1"></i> 问题反馈
                    </button>
                  </li>
                </ul>
              </div>

            </div>
          </div>
        </col-nav-main>
        <col-nav-sub>
          <div v-if="oasisId">
            <oasisoptions  @unfollow-success="handleUnfollowSuccessEventV" @follow-success="handleJoinSuccessEventV"  ref="oasisinvitationModal"  :joinedoasis="joinedoases" :oasis_announce="announce"  :oasis_id="oasisId"  :brand_id="getIdentity().brandId"/>
          </div>
          <div class="nav-sub-container">
            <div>
              <div>
                <fastlinks  :links="fastlinks"/>
              </div>

              <a  class="nav-link nva-link-default p-2 ms-3 d-flex flex-row align-items-center" :href="'/'+oasisHandle">
                <i class="bi bi-house"></i>
                  
            
                <span>主页</span>  
              </a>
              <div v-for="channel in channelSort" 
                :class="{'channel-active': currentOch==channel}"
                class="w-100 position-relative sub-channel-box">
                <a  
                :class="{
                  'nva-link-default': currentOch!=channel,
                  'nav-sub-link-active ':  currentOch==channel}"
                    class="nav-link   p-2 ms-3  d-flex flex-row align-items-center" :href="'/' + oasisHandle + '/channel/' + getChannelDataV(channel,oaisiChannelList).oasisChannelId">
              
                  <img :src="getChannelDataV(channel,oaisiChannelList).appLogo" alt="logo">
                  <span class="link-title">{{getChannelDataV(channel,oaisiChannelList).channelName}}</span>  

                </a>
                <div :class="{'isAdmin': initiatorRoleV()}" class="channel-options">
                  <div class="channel-options-ctl">
                      <a target="_blank" :href="getChannelDataV(channel,oaisiChannelList).appAdminUrl + '?och=' + channel" class="option-channel-setting">
                          <button type="button" class="btn  btn-secondary"><i class="bi bi-gear"></i></button>
                      </a>
                  </div>
                </div>
              </div>
    
              
              
            </div>
            
            
          </div>
        </col-nav-sub>
      </div>
    </div>
    
    <col-content>
      <header>
        <div class="d-flex justify-content-between h-100 align-items-center  text-white">
          <div class="d-flex align-items-center logo">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none">
              <div class="align-middle">
                <img src="/common/images/blv-rainbow-logo-trail.png" class="feature-logo" alt="feature logo">
              </div>
            </a>
          </div>
          <div class="toggle-nav">
            <button class="navbar-toggler p-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mcSidebar" aria-controls="bdSidebar" aria-label="Toggle mcSidebar navigation">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="bi" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 11.5A.5.5 0 0 1 3 11h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4A.5.5 0 0 1 3 7h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4A.5.5 0 0 1 3 3h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <div class="content-wrapper w-100">

        <div v-show="tier.length==0 && init_finish"  class="content-blank">

          <div class="not-found-resource">
            <img src="https://d13-content.oss-cn-hangzhou.aliyuncs.com/common/image/not-found-result.png"
              alt="bluvarri-service-not-found">
              <h4>内容筹备中，敬请期待</h4>

              <a v-if="initiatorRoleV()"  :href="'/'+oasisHandle+'/setting-membership'">
                <button class="btn-subscrible-now">配置套餐</button>
              </a>

  
          </div>

        </div>

     

        <div v-if="tier.length>0" class="content-core">


        <div class="pay-cycle mb-3">
          <div class="pay-cycle-box">
            <div>
              <input type="radio" value="monthly" v-model="currentCardType" 
                class="btn-check" name="options-base" id="payMonthly" autocomplete="off" checked>
              <label class="btn radio-label" for="payMonthly">月卡</label>
            </div>
            <div class="ms-2">
              <input type="radio" value="yearly" v-model="currentCardType" 
                class="btn-check" name="options-base" id="payYearly" autocomplete="off">
              <label class="btn radio-label" for="payYearly">年卡</label>
            </div>
          </div>
        </div>

        <div class="row g-2 g-md-3  row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3">
          <div  v-for="membershipTier in tier" class="col">
            <div class="tier-card">
              <div class="tier-img-container" >
                <img :src="adaptiveImageUriV(membershipTier.thumbnail)" alt="tier img">
              </div>
              <div class="tier-info">
                <div class="tier-info__head">
                  <div  class="tierInfoHead-wrp">
                    <div class="tier-info__name">{{membershipTier.tierName}}</div>
                    <div class="tier-info__price">
                      <div>
                        <span class="tier-price">
                          <div>¥{{calTotalV(membershipTier.price)}}</div>
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="tier-info__cta">
                  <button v-if="membershipTier.features.length > 0 && !tierInActiveV(membershipTier)" class="btn-subscrible-now" v-preventreclick @click="showOrderTierFocusModalV(membershipTier)">立即开通</button>
                  <button v-if="membershipTier.features.length > 0 && tierInActiveV(membershipTier)" class="btn-subscrible-now">{{getDayNameV(membershipTier.endAt)}}到期</button>
                  <button v-if="membershipTier.features.length==0" class="btn-subscrible-now">筹备中</button>

            
                </div>
                <div class="tier-info__body">
                  <div class="tier-description">
                    {{membershipTier.tierDescription}}
                  </div>
                  <div class="features">
                    <div class="features__title">订阅后开放频道：</div>
                    <div class="features_list">

                      <div v-for="feature in membershipTier.features" class="features_item" >
                        <div>
                          <span>
                            <i class="bi bi-check me-1" style="color: #3fb950;"></i>
                          </span>
                        </div>
                        <div>
                          <span>
                            {{feature.channelName}} 
                          </span>
                        </div>
  
                      </div>

                    </div>
                   
                  </div>
                  <div v-if="membershipTier.features.length>0" class="dropup">

                    <a class="btn-dropdown  dropdown-toggle"  role="button" data-bs-toggle="dropdown" aria-expanded="false">
                      查看所有频道
                    </a>
      
                    <div class="dropdown-menu">
                      <div class="feature-list-menu">
        
                        <div v-for="feature in membershipTier.features" class="features_item">
                          <div>
                            <span>
                              <i class="bi bi-check me-1" style="color: #3fb950;"></i>
                            </span>
                          </div>
                          <div>
                            <span>
                              {{feature.channelName}} 
                            </span>
                          </div>
    
                        </div>
        
                      </div>
                    </div>
      
                  </div>

                </div>

              </div>
            </div>
          </div>
        </div>

        </div>


      </div>


    </col-content>
    <section class="modals">
      <!-- focus modal start -->
      <div class="modal-container">
        <div class="modal fade" id="focusModal" data-bs-backdrop="static" tabindex="-1">
          <div class="modal-dialog  modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
              <!--begin::Alert-->
            <div class="d-flex text-center flex-column alert-info mb-5">


              <!--begin::Icon-->
              <i class="bi bi-exclamation-circle mb-2"></span><span class="path2"></span><span class="path3"></span></i>
              <!--end::Icon-->

              <!--begin::Wrapper-->
              <div class="text-center">
                  <!--begin::Title-->
                  <span class="fw-bold mb-2 modal-head">操作提示</span>
                  <!--end::Title-->

                  <!--begin::Separator-->
                  <div class="separator separator-dashed border-dark opacity-25 mb-2"></div>
                  <!--end::Separator-->

                  <!--begin::Content-->
                  <div class="font12" style="word-break: break-all; padding-left: .5rem; padding-right: .5rem;">
                      <span class="me-2">即将为您订阅套餐:</span>
                      <span  style="font-weight: 600;">{{focusModal.feed}}</span>
                      
                  </div>
      
                  <!--end::Content-->

                  <!--begin::Buttons-->
                  <div class="d-flex justify-content-center flex-wrap pt-5">
                      <a  v-preventreclick @click="closeOrderTierFocusModalV" class="btn btn-cancel m-3">取消操作</a>
                      <a  v-preventreclick @click="focusModal.confirmHandler" class="btn btn-confirm m-3">确认订阅</a>
                  </div>
                  <!--end::Buttons-->
              </div>
              <!--end::Wrapper-->
            </div>
            <!--end::Alert-->
            </div>
          </div>
        </div>
      </div>
      <!-- focus modal end -->

    </section>
    

  </micro-app>
  <section class="feedback_offcanvas" id="section_feedback_offcanvas">

    <div class="offcanvas offcanvas-end" tabindex="-1" id="feedback_offcanvas_right" aria-labelledby="feedbackOffcanvasRightLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="feedbackOffcanvasRightLabel">发送反馈到小蔚</h5>
        <button id="closeFeedbackOffcanvas" type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <form id="feedback-form">
          <div class="mt-3">
            <label for="input_issue" class="form-label">您遇到的具体问题是什么(必填,300字以内)</label>
            <textarea  rows="8" type="text" maxlength="300" class="form-control"  id="input_issue"></textarea>
          </div> 
          <div class="mt-3">
            <label class="form-label">附件图片(选填)</label>
            <div class="feedback-attachment-upload-container dropzone-wrapper">
              <img  id="lastestFeedbackAttachment" >
              <div class="dropzone-desc">
                <i class="bi bi-cloud-plus"></i>
              </div>
              <input type="file" id="input_issue_attachment"  accept="image/jpg, image/png, image/jpeg" class="dropzone">
            </div>
          </div>  
          <div class="mt-3">
            <label for="input_issue_contact" class="form-label">您的联系方式(选填)</label>
            <input id="input_issue_contact"  min="1" max="50000" step="1" type="text" class="form-control" placeholder="请留下邮箱或电话，使我们快速反馈">
          </div> 
          <button type="submit" class="btn btn-primary mt-5 w-100">提交</button>
        </form>
      </div>
    </div>

  </section>
  <script type="module" src="/common/javascripts/feedback.js"></script>
  <script type="module" src="/common/javascripts/tm.js"></script>
  <script type="module" src="/rainbow/oasis/javascripts/membership.js"></script>



</body>
</html>
