<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv='content-language' content='zh-cn'>

  <link rel="icon" href="https://www.bluvarri.com/favicon.png">
  <title>管理权移交</title>
  <script src="/common/javascripts/avif-webp.min.js"></script>

  <link rel="stylesheet" href="/common/stylesheets/style.scss">

  <link rel="stylesheet" href="/rainbow/oasis/stylesheets/setting.scss">


</head>

<body>
  <micro-app id="app" v-cloak>
    <main class="d-flex flex-row">

      <div class="offcanvas-xxl offcanvas-start" tabindex="-1" id="mcSidebar" aria-labelledby="mcSidebarOffcanvasLabel">

        <col-nav-main>
          <nav>
            <div class="oasis-head">
              <a :href="'/'+oasisHandle">
                <img class="oasis-avatar" :src="adaptiveImageUriV(announce.avatar) || oasisAvatarDefault"
                  @error.once="e => { e.target.src = oasisAvatarDefault }">
              </a>
              <div class="oasis-title">{{announce.title}}</div>
            </div>
            <div class="list-group list-group-flush">
              <a :href="'/'+oasisHandle+'/setting'" class="list-group-item">基础设置</a>
              <a :href="'/'+oasisHandle+'/setting-role'" class="list-group-item">身份组</a>
              <a :href="'/'+oasisHandle+'/setting-member'" class="list-group-item">成员管理</a>
              <a :href="'/'+oasisHandle+'/setting-membership'" class="list-group-item">会员套餐</a>
              <a :href="'/'+oasisHandle+'/setting-equity-register'" class="list-group-item">权益注册</a>
              <a :href="'/'+oasisHandle+'/setting-equity-write-off'" class="list-group-item">权益回馈</a>
              <a :href="'/'+oasisHandle+'/setting-fast-link'" class="list-group-item ">快速访问</a>
              <a :href="'/'+oasisHandle+'/setting-invitation'" class="list-group-item ">邀请</a>
              <a :href="'/'+oasisHandle+'/setting-invitation-link'" class="list-group-item">邀请链接</a>
              <a href="#" class="list-group-item active">管理权移交</a>

            </div>
          </nav>
        </col-nav-main>

      </div>


      <col-content>
        <header>
          <div class="d-flex justify-content-between align-items-center h-100  text-white">
            <div class="d-flex align-items-center logo">
              <a href="#" class="d-flex align-items-center text-white text-decoration-none">
                <div class="align-middle">
                  <h2 class="my-0">部落设置</h2>
                </div>
              </a>
            </div>
            <div class="toggle-nav">
              <button class="navbar-toggler p-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mcSidebar"
                aria-controls="bdSidebar" aria-label="Toggle mcSidebar navigation">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="bi" fill="currentColor"
                  viewBox="0 0 16 16">
                  <path fill-rule="evenodd"
                    d="M2.5 11.5A.5.5 0 0 1 3 11h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4A.5.5 0 0 1 3 7h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4A.5.5 0 0 1 3 3h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z">
                  </path>
                </svg>
              </button>
            </div>
          </div>
        </header>

        <div class="content-container">


          <div class="feature-title">
            管理权移交
          </div>

          <div class="cardPrimary">
            <div class="d-flex" style="flex: 1 1 auto;">
              <div class="d-flex align-items-center" style="flex: 1 1 auto;">
                <div class="ct-wrp">
                  <div class="icon-container">
                    <i class="bi bi-suitcase"></i>
                  </div>
                </div>

                <div class="feature-notice-detail">
                  移交最高权限，移交成功后意味着您不再拥有部落管理员的权限和资源。
                </div>
              </div>
            </div>
          </div>


          <div style="margin-bottom: 16px;">
            <div class="tb-search">
              <div class="tb-search-group">
                <i class="bi bi-search"></i>
                <input @keyup.enter.native="fetchOasisMemberV" v-model="q" type="search" class="input_search"
                  placeholder="搜索成员..." autocomplete="off">
              </div>
            </div>
          </div>

          <div v-for="member in members" class="authed-link">
            <div class="authed-link-header">
              <img :src="adaptiveImageUriV(member.memberAvatar)|| defaultAvatarImage" @error="e => { e.target.src = defaultAvatarImage }"  style="position: relative;">
              <div class="link-info">
                <h4>{{member.memberName}}</h4>
                <div class="link-info-time">
                  {{ formatDateV(member.joinOasisAt)}} 加入
                </div>
              </div>
              <button v-preventreclick @click="showChangeAdminModalV(member)" class="btn-del-link">
                <div class="btn-contents">
                  交接
                </div>
              </button>
            </div>

            <div class="authed-link-body">
              <div>
                <h5>私信成员<a :href="'/messages/'+member.memberUserId" target="_blank"><i
                      class="bi bi-box-arrow-up-right ms-2"></i></a> </h5>
                <div class="authed-link-desc">{{member.memberTitle}}</div>
              </div>
            </div>

          </div>

          <div v-show="members.length==0 && init_finish" class="not-found-resource">
            <img src="https://d13-content.oss-cn-hangzhou.aliyuncs.com/common/image/not-found-result.png"
              alt="bluvarri-service-not-found">
            <h4>未找到结果</h4>
          </div>

        </div>
      </col-content>
    </main>
    <section class="modals">
      <!-- Modal -->
      <div class="modal fade" id="changeAdminModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog  modal-dialog-centered modal-dialog-scrollable">
          <div class="modal-content text-color-dark">
            <div class="modal-header">
              <h1 class="modal-title fs-5">变更管理员</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form>

                <div class="mt-3">
                  <label for="input[newManagerBrandName]" class="form-label">新任管理员</label>
                  <input id="input[newManagerBrandName]" v-model="changeAdminModalObj.newManagerBrandName"
                  type="text" class="inputDefault" autocomplete="off" disabled>
                </div>
                <div class="mt-3">
                  <label for="input[newManagerRealName]" class="form-label">新任管理员真实名称</label>
                  <input id="input[newManagerRealName]" v-model="changeAdminModalObj.newManagerName" type="text"
                  class="inputDefault" maxlength="36" autocomplete="off">
                </div>


              </form>

            </div>
            <div class="modal-footer btn-light">
              <button 
                :class="{'disabled btn-secondary': !changeAdminModalObj.newManagerName,'btn-primary': !!changeAdminModalObj.newManagerName }"
               v-preventreclick @click="changeManagerV" type="button" class="btn modal-btn-ui">提交</button>
            </div>
          </div>
        </div>
      </div>
    </section>

  </micro-app>


  <script type="module" src="/common/javascripts/tm.js"></script>
  <script type="module" src="/rainbow/oasis/javascripts/setting-change-admin.js"></script>



</body>

</html>
