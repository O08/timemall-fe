     <div class="content-wrapper w-100">
      
      <!-- search  pannel start -->
      <div class="content-block pt-5">
        <div class="d-flex justify-content-center">

          <top-search class="section-top-serach">
            <div class="search">
              <input @keyup.enter.native="retrieveLinkTableV" v-model="link_pagination.param.q" type="text"  class="form-control Search-Button-Placeholder" placeholder="输入链接或关键词">
              <div class="Search-Icon-Container d-flex align-items-center"> 
                <svg width="20" height="20" class="Search-Icon" viewBox="0 0 20 20">
                  <path d="M14.386 14.386l4.0877 4.0877-4.0877-4.0877c-2.9418 2.9419-7.7115 2.9419-10.6533 0-2.9419-2.9418-2.9419-7.7115 0-10.6533 2.9418-2.9419 7.7115-2.9419 10.6533 0 2.9419 2.9418 2.9419 7.7115 0 10.6533z" stroke="#616161" fill="none" fill-rule="evenodd" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>  
              </div>
            </div>
          </top-search>

        </div>

        
        <div class="search-menu-container">

          

          <div class="condition-box">
            <label class="search-cfg">推广信息</label>
            <div class="cdn-field">
              <div class="field-content">
                <div class="dropdown ">
                  <button class="btn dropdown-toggle tool-tip-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    浏览量
                  </button>
                  <form class="dropdown-menu  p-4 tool-tip-form" onsubmit="return false">
                    <div class="row g-3">
                      <div class="col-6 input-wrapper">
                        <label for="input_views_left" class="form-label">下限</label>
                        <input  v-model="link_pagination.param.viewsLeft" type="text" min="1" max="50000" step="1" class="form-control" id="input_views_left" @input="transformInputNumberAsPositiveV($event)">
                        <i>千</i>
                      </div>
                      <div class="col-6 input-wrapper">
                        <label for="input_views_right" class="form-label">上限</label>
                        <input  v-model="link_pagination.param.viewsRight"  type="text" min="1" max="50000" step="1" class="form-control" id="input_views_right" @input="transformInputNumberAsPositiveV($event)">
                        <i>千</i>
                      </div>
                    </div>
                    
                    <button v-preventreclick @click="filterLinkTableV" type="submit" class="btn btn-dark">确定</button>
                  </form>
                </div>
              </div>
              
              <div class="field-content">
                <div class="dropdown ">
                  <button class="btn dropdown-toggle tool-tip-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    IP数
                  </button>
                  <form class="dropdown-menu  p-4 tool-tip-form" onsubmit="return false">
                    <div class="row g-3">
                      <div class="col-6 input-wrapper">
                        <label for="input_ip_volume_left" class="form-label">IP数量下限</label>
                        <input v-model="link_pagination.param.ipVolumeLeft" type="text" min="1" max="5000000" step="1" class="form-control" id="input_ip_volume_left" @input="transformInputNumberAsPositiveV($event)">
                        <i>个</i>
                      </div>
                      <div class="col-6 input-wrapper">
                        <label for="input_ip_volume_right" class="form-label">IP数量上限</label>
                        <input v-model="link_pagination.param.ipVolumeRight"  type="text" min="1" max="5000000" step="1" class="form-control" id="input_ip_volume_right" @input="transformInputNumberAsPositiveV($event)">
                        <i>个</i>
                      </div>
                    </div>                  
                    <button v-preventreclick @click="filterLinkTableV" type="submit" class="btn btn-dark">确定</button>
                  </form>
                </div>
              </div>
              
              <div class="field-content">
                <div class="dropdown ">
                  <button class="btn dropdown-toggle tool-tip-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                  收入
                  </button>
                  <form class="dropdown-menu  p-4 tool-tip-form" onsubmit="return false">
                    <div class="row g-3">
                      <div class="col-6 input-wrapper">
                        <label for="input_earning_left" class="form-label">最小收入</label>
                        <input v-model="link_pagination.param.earningLeft" type="text" min="1" max="5000000" step="1" class="form-control" id="input_earning_left" @input="transformInputNumberAsPositiveV($event)">
                        <i>￥</i>
                      </div>
                      <div class="col-6 input-wrapper">
                        <label for="input_earning_right" class="form-label">最大收入</label>
                        <input v-model="link_pagination.param.earningRight"  type="text" min="1" max="5000000" step="1" class="form-control" id="input_earning_right" @input="transformInputNumberAsPositiveV($event)">
                        <i>￥</i>
                      </div>
                    </div>             
                    <button v-preventreclick @click="filterLinkTableV" type="submit" class="btn btn-dark">确定</button>
                  </form>
                </div>
              </div>
              


            </div>

          </div>

          <div class="condition-box">
            <label class="search-cfg">展示</label>
            <div class="cdn-field">
              <div class="field-content">
                <select @change="filterLinkTableV" v-model="link_pagination.param.sort" class="form-select tm-select sort-select" >
                  <option value="">排序</option>
                  <option value="1">收入</option>
                  <option value="2">IP数</option>
                  <option value="3">浏览量</option>
                </select>
              </div>

            </div>

          </div>


        </div>

      </div>
       <!-- search  pannel end -->

       <!-- service list pannel start -->
      <div class="content-block mt-5">
        <div class="heading d-flex align-items-center justify-content-between">
          <div>
            链接列表
          </div> 
          <button @click="showAddLinkModalV" class="btn btn-action-submit ms-5" type="button">
            <i class="bi bi-plus-circle-fill"></i> 添加新链接
          </button>

        </div>
        <div class="table-responsive">
          <div class="table-wrp">

            <table class="table table-dark">
              <thead>
                <tr>
                  <th scope="col" class="col-options">操作</th>
                  <th scope="col" class="col-chn">链接名称</th>
                  <th scope="col" class="col-chn">推广链接</th>
                  <th scope="col">有效IP数</th>
                  <th scope="col">预计收入</th>
                  <th scope="col">浏览量</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="item in link_pagination.records">
                  <th class="col-options">
                    <button @click="showEditLinkModalV(item)" class="btn btn-primary" type="button">
                      <i class="bi bi-pencil-square"></i>
                      重命名
                    </button>
                    <button v-preventreclick @click="removeLinkV(item.id)" class="btn btn-outline-danger ms-3" type="button">
                      <i class="bi bi-dash-circle-fill"></i>
                       移除
                     </button>
                  </th>
                  <td class="col-chn">
                    <div class="ellipsis-2">
                      {{item.linkName}}
                    </div>
                  </td>
                  <td class="col-chn">
                    <div class="channel-id-txt">
                      <span @click="copyValueToClipboardV(item.linkAddress)"><i class="bi bi-copy"></i></span>&nbsp;<span class="ms-2">{{item.linkAddress}}</span> 
                    </div>
                  </td>
                  <td>{{item.ips}}</td>
                  <td>{{item.earning}}</td>
                  <td>{{item.views}}</td>
                </tr>
                
              </tbody>
            </table>
            <div v-show="link_pagination.records.length==0" class="empty-content-block">
    
              没有可用的内容！
    
            </div>
            <nav v-if="!!link_pagination.paging" aria-label="Page navigation" class="millstone-pagination">
              <ul class="pagination pagination-lg pagination-dark  border-0">
                <li class="page-item" @click="pagePre(link_pagination)">
                  <a class="page-link"  aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                  </a>
                </li>
                <li class="page-item"  v-for="page in link_pagination.paging.items" :class="{'current-page-active': link_pagination.paging.current == page}" 
                      @click="pageGo(link_pagination,page)"><a class="page-link">{{page}}</a></li>
                <li class="page-item" @click="pageNext(link_pagination)">
                  <a class="page-link" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                  </a>
                </li>
              </ul>
            </nav>

          </div>
        </div>
        

      </div>

      <!-- service list pannel end -->

      
     </div>


    </col-content>
    <section class="modals">
      <div class="modal-container">
          
        <!-- add link Modal -->
        <div class="modal fade dcModal" id="addLinkModal" data-bs-backdrop="static" tabindex="-1">
          <div class="modal-dialog  modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content text-color-dark">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="addLinkModalModalLabel">添加新链接</h1>
                <button  type="button" id="closeAddLinkModalModal" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <form>
                  <div class="mb-3 mt-3">
                    <label for="input[linkName]" class="form-label">链接名称</label>

                    <input v-model="addLinkObj.linkName" id="input[linkName]"  type="text" maxlength="80" class="form-control">

                  </div> 
                  <div class="mb-3 mt-3">
                    <label for="input[trackCode]" class="form-label">
                      监测码
                      <a data-bs-custom-class="custom-popover" data-bs-placement="right" data-bs-trigger="hover" data-bs-toggle="popover" data-bs-content="监测码是由字母、数字、_组成的简单的字符串，用于追踪你的推广情况。支持最大长度为32">
                        <i class="bi bi-question-circle"></i>
                      </a>

                    </label>
                    <input @input="transformInputTextV($event)"  v-model="addLinkObj.trackCode" id="input[trackCode]"  type="text" maxlength="32" class="form-control">

                  </div> 
                </form>
                
              </div>
              <div class="modal-footer btn-light">
                <button 
                :class="{'disabled': !addLinkObj.linkName || !addLinkObj.trackCode}"
                v-preventreclick
                @click="addLinkV" type="button"  class="btn btn-action-submit w-100">添加</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- edit link Modal -->
      <div class="modal fade dcModal" id="editLinkModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog  modal-dialog-centered modal-dialog-scrollable">
          <div class="modal-content text-color-dark">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="editLinkModalLabel">链接重命名</h1>
              <button  type="button" id="closeEditLinkModalModal" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form>
                <div class="mb-3 mt-3">
                  <label for="input[linkName-edit]" class="form-label">链接名称</label>

                  <input v-model="editLinkObj.linkName" id="input[linkName-edit]"  type="text" maxlength="80" class="form-control">

                </div> 
              </form>
              
            </div>
            <div class="modal-footer btn-light">
              <button 
              :class="{'disabled': !editLinkObj.linkName}"
              v-preventreclick
               @click="renameLinkNameV" type="button"  class="btn btn-action-submit w-100">修改</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    </section>

  </micro-app>
  <section class="feedback_offcanvas" id="section_feedback_offcanvas">

    <div class="offcanvas offcanvas-end" tabindex="-1" id="feedback_offcanvas_right" aria-labelledby="feedbackOffcanvasRightLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="feedbackOffcanvasRightLabel">发送反馈到小蔚</h5>
        <button id="closeFeedbackOffcanvas" type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <form id="feedback-form">
          <div class="mt-3">
            <label for="input_issue" class="form-label">您遇到的具体问题是什么(必填,300字以内)</label>
            <textarea  rows="8" type="text" maxlength="300" class="form-control"  id="input_issue"></textarea>
          </div> 
          <div class="mt-3">
            <label class="form-label">附件图片(选填)</label>
            <div class="feedback-attachment-upload-container dropzone-wrapper">
              <img  id="lastestFeedbackAttachment" >
              <div class="dropzone-desc">
                <i class="bi bi-cloud-plus"></i>
              </div>
              <input type="file" id="input_issue_attachment"  accept="image/jpg, image/png, image/jpeg" class="dropzone">
            </div>
          </div>  
          <div class="mt-3">
            <label for="input_issue_contact" class="form-label">您的联系方式(选填)</label>
            <input id="input_issue_contact"  min="1" max="50000" step="1" type="text" class="form-control" placeholder="请留下邮箱或电话，使我们快速反馈">
          </div> 
          <button type="submit" class="btn btn-primary mt-5 w-100">提交</button>
        </form>
      </div>
    </div>

  </section>
  <script type="module" src="/common/javascripts/feedback.js"></script>
  <script type="module" src="/common/javascripts/tm.js"></script>
  <script type="module" src="/affiliate/javascripts/cpc-link.js"></script>


</body>
</html>
